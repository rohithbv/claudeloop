services:
  claudeloop:
    image: ghcr.io/rohithbv/claudeloop:latest
    expose:
      - "${PORT:-3000}"
    volumes:
      - claudeloop-data:/app/data
      - claudeloop-workspaces:/app/workspaces
      - claudeloop-home:/home/node
    environment:
      - PORT=${PORT:-3000}
      # Only required for tasks configured with "API Key" auth mode.
      # Leave unset (or remove this line) when using subscription auth.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    restart: unless-stopped

volumes:
  claudeloop-data:
  claudeloop-workspaces:
  claudeloop-home:
