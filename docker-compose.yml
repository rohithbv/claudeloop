services:
  claudeloop:
    build: .
    ports:
      - "0.0.0.0:${PORT:-3000}:${PORT:-3000}"
    environment:
      - PORT=${PORT:-3000}
    volumes:
      # Persist the SQLite database across container restarts
      - claudeloop-data:/app/data
      # Persist task working directories across container restarts
      - claudeloop-workspaces:/app/workspaces
      # Mount host Claude CLI config directory for subscription auth.
      # The CLI writes session data and history here at runtime, so it must
      # be writable. Credentials must be file-based: run
      #   claude setup-token
      # on the host before starting this container. Regular `claude login`
      # stores the token in the macOS Keychain which is not accessible inside
      # the Linux container — setup-token writes it to ~/.claude instead.
      - claudeloop-home:/home/node/

volumes:
  claudeloop-data:
  claudeloop-workspaces:
  claudeloop-home:
